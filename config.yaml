# =============================================================================
# Qwen3.5-4B 配置文件
# =============================================================================

# 模型配置
model:
  name: "Qwen3.5-4B-AWQ-4bit"
  quantization: "awq"                    # 4-bit AWQ 量化
  server_url: "http://vllm-server:8000/v1"   # 容器内访问地址 (由环境变量覆盖)

# 推理优化参数 (针对 8GB 小显存优化)
# -----------------------------------------------------------------------------
# 【参数说明指南】
# temperature:        (默认0.0) 必须保持为 0.0！对于需要精确提取生僻字和原样照抄的 OCR 任务，
#                     任何高于 0.0 的值都会让模型产生随机幻觉和“脑补”，从而出现错别字。
# top_p:              (默认0.95) 只有在 temperature > 0 时才生效。控制词汇的概率截断。
# top_k:              (默认20) 只有在 temperature > 0 时才生效。限制备选词汇池的大小。
# min_p:              (默认0.0) 丢弃概率低于该阈值的生僻词。
# presence_penalty:   (默认0.0) 存在惩罚。>0 会鼓励模型尝试新的话题。OCR 不需要修改。
# repetition_penalty: (默认1.15) 重复惩罚。1.0 代表不惩罚。如果发现模型一直在复读同一句话，
#                     可以稍微调高（如 1.05 或 1.1）。
# -----------------------------------------------------------------------------
inference:
  temperature: 0.0
  max_tokens: 6000
  top_p: 1.0
  top_k: 50
  min_p: 0.0
  presence_penalty: 0.0
  repetition_penalty: 1.15
  thinking_enabled: false      # 关闭 thinking 模式以节省 token

# 处理配置
processing:
  max_workers: 8                # 客户端并发请求数 (与模型承载力及显存大小相关)
  output_formats:               # 输出格式列表: markdown, json
    - markdown
    - json
  merge_output: true            # 是否生成合并文件
  archive_processed: true       # 处理完后移到 input/processed/
  pdf_dpi: 200                  # PDF 渲染 DPI
  supported_extensions:         # 支持的文件扩展名
    - .jpg
    - .jpeg
    - .png
    - .bmp
    - .tiff
    - .tif
    - .pdf

# OCR 识别配置
ocr:
  backend: "qwen-vl"           # 当前使用的 OCR 后端: qwen-vl
  system_prompt: |
    你是一个专业的医疗文档 OCR 识别助手。
    你的任务是精确地将图片中的文字转化为文本，为后续的结构化提取提供完美的语料。
  user_prompt: "请识别这张图片中的核心病历文字内容，保持原始段落格式。"

# 结构化 JSON 提取配置
extraction:
  enabled: true                  # 是否启用结构化提取 (暂时关闭，专注 OCR)
  system_prompt: |
    请根据以下 schema 提取信息，并以严格的 JSON 格式输出。
    【核心任务】：你是一个专业的结构化病历提取专家，需要从杂乱的 OCR 文本中提取关键病历特征。
    【重要规则 - 模板式提取与细粒度溯源 (Grounding)】：
    你的提取过程必须像填空题一样，严格按照给定的 JSON Template 骨架进行填充。
    由于输出长度限制，你绝对不能摘抄原话！
    提供给你的原文已经按短句和标点打上了编号（如 [0], [1]...）。
    每一项被提取的数据，必须使用包含 `value` 和 `evidence_id` 两个字段的对象来表示。
    - `value`：你对该字段提取出的总结内容或数值（严格遵照 Template 中要求的类型，如 string 或 boolean）。
    - `evidence_id`：支撑该结论的最核心的原文句子编号（**必须是 integer 整数**，例如 5。如果有多个句子支撑，只输出最核心的一句的编号）。如果无提及，填 -1。
    （注：后处理程序会根据你提供的编号，自动映射回完整的证据段落，所以你绝对不要自己输出文字证据！）
    
    绝对禁止输出任何推理过程！只输出完整的 JSON 对象！直接从 { 开始输出！
  user_prompt_template: |
    <|input|>
    ### Template:
    {schema_template}

    ### Text:
    {text}
    
    <|output|>
  # JSON Schema 定义 — 按照《结构化字段.docx》重新规划
  schema:
    - field: "chief_complaint"
      type: "object"
      description: "主诉。"
    - field: "history_of_present_illness"
      type: "object"
      description: "现病史。必须提取为包含多个具体键的对象，如：初次发病情况, 后续发病情况, 院内诊断情况, 近期症状, 精神, 大便情况, 小便情况, 体重变化。这些键的值都是包含 value, evidence_id 的对象。"
    - field: "past_medical_history"
      type: "object"
      description: "既往史。包括但不限于心脏病、高血压、糖尿病、乙肝、便血、肾炎、血液病、冠心病、脑梗塞、手术史、输血史、血制品史、过敏史等。将原文提到的每一项既往病史作为独立的键，值为包含 value, evidence_id 的对象。"
    - field: "personal_history"
      type: "object"
      description: "个人史。包含工作、吸烟史、饮酒史等。将原文提到的各项个人史作为独立的键，值为包含 value, evidence_id 的对象。"
    - field: "family_history"
      type: "object"
      description: "家族史。提取关于家族中相关疾病历史的信息，值为包含 value, evidence_id 的对象。"
    - field: "physical_examination"
      type: "object"
      description: "体格检查。包括生命体征(体温/脉搏/呼吸/血压/身高/体重/BMI)，以及异常的专科查体(皮肤/眼部/耳部/鼻部/口腔/颈部/胸部/乳房/呼吸/心律/腹部/四肢/神经)。提取原文中明确指出的体征，将其作为键，值为包含 value, evidence_id 的对象。"
    - field: "ancillary_tests"
      type: "object"
      description: "辅助检查。包括但不限于胸部CT、心脏超声、血气、血常规、电解质、肾功、D2聚体等。提取各项检查结论作为键，值为包含 value, evidence_id 的对象。"
    - field: "preliminary_diagnosis"
      type: "object"
      description: "初步诊断。"
    - field: "final_diagnosis"
      type: "object"
      description: "最终诊断。"

# 增量监控配置
monitor:
  enabled: true                 # 是否启用增量监控
  interval_seconds: 10          # 轮询间隔 (秒)
  settle_seconds: 3             # 新文件到达后等待写入完成的秒数
